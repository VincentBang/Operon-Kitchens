<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 210" role="img" aria-labelledby="title desc">
  <title id="title">Operon Kitchens horizontal logo</title>
  <desc id="desc">Operon circular emblem with bold OPERON wordmark, vertical divider and KITCHENS branch descriptor.</desc>
  <defs>
    <linearGradient id="navyGradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#08233F"/>
      <stop offset="0.52" stop-color="#061A31"/>
      <stop offset="1" stop-color="#092541"/>
    </linearGradient>
    <linearGradient id="goldGradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#B8842C"/>
      <stop offset="0.48" stop-color="#D0A24A"/>
      <stop offset="1" stop-color="#9E6F24"/>
    </linearGradient>
    <style>
      .navy{fill:none;stroke:url(#navyGradient);stroke-width:10;stroke-linecap:square;stroke-linejoin:miter}
      .goldStroke{fill:none;stroke:url(#goldGradient);stroke-width:5.5;stroke-linecap:square;stroke-linejoin:miter}
      .navyFill{fill:url(#navyGradient)}
      .goldFill{fill:url(#goldGradient)}
      .word{fill:url(#navyGradient);font-family:Inter,Arial,sans-serif;font-size:82px;font-weight:950;letter-spacing:-1px}
      .branch{fill:url(#goldGradient);font-family:Inter,Arial,sans-serif;font-size:40px;font-weight:900;letter-spacing:3px}
      .divider{fill:url(#goldGradient)}
    </style>
  </defs>
  <g transform="translate(22 22)">
    <path class="navy" d="M83 0A83 83 0 0 0 0 83"/>
    <path class="navy" d="M166 83A83 83 0 0 0 83 0"/>
    <path class="navy" d="M83 166A83 83 0 0 0 166 83"/>
    <path class="navy" d="M0 83A83 83 0 0 0 83 166"/>
    <rect class="navyFill" x="75" y="9" width="16" height="59"/>
    <rect class="navyFill" x="75" y="98" width="16" height="59"/>
    <rect class="navyFill" x="9" y="75" width="59" height="16"/>
    <rect class="navyFill" x="98" y="75" width="59" height="16"/>
    <path class="goldStroke" d="M34 34l32 32M132 34l-32 32M34 132l32-32M132 132l-32-32"/>
    <path class="navyFill" d="M54 55h29v14H68v14H54z"/>
    <path class="navyFill" d="M83 55h29v28H98V69H83z"/>
    <path class="navyFill" d="M54 83h14v14h15v14H54z"/>
    <path class="navyFill" d="M98 83h14v28H83V97h15z"/>
    <circle cx="83" cy="83" r="25" fill="#fff" stroke="url(#goldGradient)" stroke-width="13"/>
    <rect class="goldFill" x="73" y="-10" width="20" height="20"/>
    <rect class="goldFill" x="73" y="156" width="20" height="20"/>
    <rect class="goldFill" x="-10" y="73" width="20" height="20"/>
    <rect class="goldFill" x="156" y="73" width="20" height="20"/>
  </g>
  <text class="word" x="240" y="128">OPERON</text>
  <rect class="divider" x="620" y="54" width="4" height="98"/>
  <text class="branch" x="652" y="125">KITCHENS</text>
</svg>
